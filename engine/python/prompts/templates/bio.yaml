  - **rNPV 湲곗뿬** ??per-asset contribution to the risk-adjusted NPV.
    Calculate if financial projections are supplied; otherwise use
    "{{ missing_placeholder }}".

  ### 2. rNPV calculation
  If financial projections (peak sales, years to launch, royalty rate,
  revenue duration) are present in the context, calculate a rough rNPV:

      rNPV ??誇_i [ (peak_sales_i 횞 LoA_i 횞 royalty_i 횞 duration_factor_i)
                    / (1 + r)^years_to_launch_i ]

  where ``r`` is the discount rate (use 10 % unless otherwise specified) and
  ``duration_factor`` discounts the revenue stream to a single present-value
  factor.  Show your workings in a collapsible <details> block.

  If projections are absent, write the total rNPV as "{{ missing_placeholder }}"
  and explain which inputs are missing.

  ### 3. Missing-data policy
  - **NEVER** fabricate clinical data, trial results, LoA estimates, or
